name: Profile Assets (Metrics, 3D Contrib, Snake, Pac-Man)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-assets:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Prepare image folder
      - name: Create assets directory
        run: mkdir -p .github/images

      # -----------------------------
      # 3. 3D Contributions
      # -----------------------------
      - name: Generate 3D Contributions
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: CM-exe

      - name: Move 3D assets
        run: |
          if [ -d profile-3d-contrib ]; then
            cp -r profile-3d-contrib/*.svg .github/images/ || true
          fi
          rm -rf profile-3d-contrib || true

      # -----------------------------
      # 4. Snake animation
      # -----------------------------
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: CM-exe
          outputs: |
            .github/images/github-snake.svg
            .github/images/github-snake-dark.svg?palette=github-dark

      # -----------------------------
      # 5. Pac-Man graph
      # -----------------------------
      - name: Generate Pac-Man graph
        uses: abozanona/pacman-contribution-graph@main
        continue-on-error: true
        with:
          github_user_name: CM-exe
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move Pac-Man output
        run: |
          mkdir -p .github/images

          if [ -f dist/pacman-contribution-graph.svg ]; then
            cp dist/pacman-contribution-graph.svg .github/images/pacman.svg
          fi

          if [ -f dist/pacman-contribution-graph-dark.svg ]; then
            cp dist/pacman-contribution-graph-dark.svg .github/images/pacman-dark.svg
          fi

      # -----------------------------
      # 6. Debug output
      # -----------------------------
      - name: List generated assets
        run: ls -al .github/images

      # -----------------------------
      # 7. Commit changes
      # -----------------------------
      - name: Commit & push assets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .github/images

          git commit -m "chore: update profile assets (metrics, snake, pacman, 3D)" || echo "No changes"

          git push origin main || git push origin master || true